<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>病例查阅 - 医生端</title>
<link rel="stylesheet" href="../css/common.css">
<style>
:root{--doctor-primary:#2A9D8F;--doctor-secondary:#E9C46A;--doctor-dark:#0A0A1A;--doctor-card:#111827;--doctor-border:rgba(42,157,143,.2);--doctor-text:#E2E8F0;--doctor-muted:#94A3B8}
body{background:var(--doctor-dark);color:var(--doctor-text)}
.sidebar{background:#0D1117;border-right:1px solid var(--doctor-border)}
.sidebar-logo .logo-icon{background:linear-gradient(135deg,#2A9D8F,#26756C)}
.nav-item{color:var(--doctor-muted)}
.nav-item:hover,.nav-item.active{background:rgba(42,157,143,.12);color:var(--doctor-primary)}
.main-content{background:var(--doctor-dark)}
.page-title{color:var(--doctor-text)}
.page-subtitle{color:var(--doctor-muted)}

.filter-bar{background:var(--doctor-card);border:1px solid var(--doctor-border);border-radius:14px;padding:18px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.filter-group label{font-size:12px;color:var(--doctor-muted)}
.filter-group input,.filter-group select{background:#1A2035;border:1px solid var(--doctor-border);color:var(--doctor-text);border-radius:8px;padding:8px 12px;font-size:13px}
.filter-group input:focus,.filter-group select:focus{outline:none;border-color:var(--doctor-primary)}
.filter-btn{background:linear-gradient(135deg,#2A9D8F,#1a7a6e);color:#fff;border:none;padding:9px 22px;border-radius:8px;cursor:pointer;font-size:13px;align-self:flex-end}
.reset-btn{background:rgba(42,157,143,.1);color:var(--doctor-primary);border:1px solid var(--doctor-border);padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px;align-self:flex-end}

.case-table-wrap{background:var(--doctor-card);border:1px solid var(--doctor-border);border-radius:14px;overflow:hidden}
.case-table{width:100%;border-collapse:collapse}
.case-table th{background:#0D1B2A;color:var(--doctor-muted);font-size:12px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--doctor-border);white-space:nowrap}
.case-table td{padding:12px 16px;border-bottom:1px solid rgba(42,157,143,.08);font-size:13px;vertical-align:middle}
.case-table tr:hover td{background:rgba(42,157,143,.04)}
.case-table tr:last-child td{border:none}

.syndrome-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-liver{background:#fef3c7;color:#92400e}
.badge-phlegm{background:#ede9fe;color:#4c1d95}
.badge-heart-spleen{background:#d1fae5;color:#065f46}
.badge-heart-kidney{background:#dbeafe;color:#1e3a8a}
.badge-gallbladder{background:#ffe4e6;color:#9f1239}
.badge-mixed{background:#f3f4f6;color:#374151}

.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-follow{background:#22c55e}
.dot-stable{background:#f59e0b}
.dot-closed{background:#6b7280}

.view-btn{background:rgba(42,157,143,.15);color:var(--doctor-primary);border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:.2s}
.view-btn:hover{background:rgba(42,157,143,.3)}

.pagination{display:flex;justify-content:center;align-items:center;gap:8px;padding:16px;border-top:1px solid var(--doctor-border)}
.page-btn{background:#1A2035;border:1px solid var(--doctor-border);color:var(--doctor-muted);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:.2s}
.page-btn:hover,.page-btn.active{background:var(--doctor-primary);color:#fff;border-color:var(--doctor-primary)}

/* 详情抽屉 */
.detail-drawer{position:fixed;top:0;right:-600px;width:580px;height:100vh;background:#0D1117;border-left:1px solid var(--doctor-border);z-index:999;transition:.35s;overflow-y:auto;padding:0}
.detail-drawer.open{right:0}
.drawer-header{background:#111827;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--doctor-border);position:sticky;top:0;z-index:1}
.drawer-close{background:none;border:1px solid var(--doctor-border);color:var(--doctor-muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px}
.drawer-body{padding:24px}
.drawer-section{margin-bottom:24px}
.drawer-section-title{font-size:13px;color:var(--doctor-primary);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{background:#1A2035;border-radius:8px;padding:12px}
.info-label{font-size:11px;color:var(--doctor-muted);margin-bottom:4px}
.info-value{font-size:14px;color:var(--doctor-text);font-weight:500}
.symptom-list{display:flex;flex-wrap:wrap;gap:6px}
.symptom-tag{background:rgba(42,157,143,.1);border:1px solid rgba(42,157,143,.25);color:var(--doctor-primary);padding:3px 10px;border-radius:20px;font-size:12px}
.score-bars{display:flex;flex-direction:column;gap:8px}
.score-bar-row{display:flex;align-items:center;gap:10px}
.score-bar-label{width:80px;font-size:12px;color:var(--doctor-muted);white-space:nowrap}
.score-bar-track{flex:1;height:8px;background:#1A2035;border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2A9D8F,#26C6DA)}
.score-bar-val{width:35px;text-align:right;font-size:12px;color:var(--doctor-text)}
.doctor-note{background:#1A2035;border-radius:10px;padding:14px;min-height:80px}
.note-textarea{width:100%;background:transparent;border:none;color:var(--doctor-text);font-size:13px;resize:vertical;min-height:80px;outline:none;font-family:inherit}
.save-note-btn{background:linear-gradient(135deg,#2A9D8F,#1a7a6e);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;margin-top:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;display:none}
.overlay.show{display:block}
.stats-row{display:flex;gap:12px;margin-bottom:20px}
.stat-mini{flex:1;background:var(--doctor-card);border:1px solid var(--doctor-border);border-radius:10px;padding:14px;text-align:center}
.stat-mini-num{font-size:24px;font-weight:700;color:var(--doctor-primary)}
.stat-mini-label{font-size:11px;color:var(--doctor-muted);margin-top:2px}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🏥</div>
    <div class="logo-text"><span>医生工作站</span><small>中医失眠系统</small></div>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>工作台</span></a>
    <a href="patients.html" class="nav-item"><span class="nav-icon">👥</span><span>患者管理</span></a>
    <a href="cases.html" class="nav-item active"><span class="nav-icon">📋</span><span>病例查阅</span></a>
    <a href="statistics.html" class="nav-item"><span class="nav-icon">📈</span><span>数据统计</span></a>
    <a href="knowledge.html" class="nav-item"><span class="nav-icon">📚</span><span>知识库管理</span></a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>系统设置</span></a>
  </nav>
  <div class="sidebar-footer">
    <a href="../index.html" class="nav-item"><span class="nav-icon">🏡</span><span>返回首页</span></a>
    <a href="#" class="nav-item" onclick="logoutUser()"><span class="nav-icon">🚪</span><span>退出登录</span></a>
  </div>
</aside>

<main class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title">病例查阅</h1>
      <p class="page-subtitle">查看患者AI辨证评估记录及详细症状分析</p>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-mini"><div class="stat-mini-num" id="totalCases">0</div><div class="stat-mini-label">总病例数</div></div>
    <div class="stat-mini"><div class="stat-mini-num" id="thisWeek">0</div><div class="stat-mini-label">本周新增</div></div>
    <div class="stat-mini"><div class="stat-mini-num" id="followCount">0</div><div class="stat-mini-label">随访中</div></div>
    <div class="stat-mini"><div class="stat-mini-num" id="avgScoreAll">0</div><div class="stat-mini-label">平均睡眠评分</div></div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <label>患者姓名/手机</label>
      <input type="text" id="filterName" placeholder="请输入关键词">
    </div>
    <div class="filter-group">
      <label>辨证证型</label>
      <select id="filterSyndrome">
        <option value="">全部证型</option>
        <option>肝火扰心</option>
        <option>痰热扰心</option>
        <option>心脾两虚</option>
        <option>心肾不交</option>
        <option>心胆气虚</option>
        <option>混合证型</option>
      </select>
    </div>
    <div class="filter-group">
      <label>随访状态</label>
      <select id="filterStatus">
        <option value="">全部</option>
        <option value="随访中">随访中</option>
        <option value="病情稳定">病情稳定</option>
        <option value="已结案">已结案</option>
      </select>
    </div>
    <div class="filter-group">
      <label>日期范围</label>
      <input type="date" id="filterDate">
    </div>
    <button class="filter-btn" onclick="applyFilter()">🔍 查询</button>
    <button class="reset-btn" onclick="resetFilter()">重置</button>
  </div>

  <div class="case-table-wrap">
    <table class="case-table">
      <thead>
        <tr>
          <th>病例编号</th>
          <th>患者姓名</th>
          <th>性别/年龄</th>
          <th>辨证证型</th>
          <th>主症得分</th>
          <th>睡眠评分</th>
          <th>随访状态</th>
          <th>评估日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="caseTableBody"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</main>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="detail-drawer" id="detailDrawer">
  <div class="drawer-header">
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--doctor-text)">病例详情</div>
      <div style="font-size:12px;color:var(--doctor-muted);margin-top:2px" id="drawerCaseId">编号：—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script src="../js/common.js"></script>
<script>
// Mock病例数据
const MOCK_CASES=[
  {id:'C2024001',patient:'李晓明',gender:'男',age:35,syndrome:'心脾两虚',mainScore:82,sleepScore:68,status:'随访中',date:'2024-05-01',symptoms:['入睡困难','多梦易醒','心悸','食欲不振','神疲乏力'],tongue:'舌淡苔薄白',pulse:'脉细弱',scores:{心脾两虚:82,心胆气虚:45,心肾不交:38,肝火扰心:20,痰热扰心:15},note:''},
  {id:'C2024002',patient:'王芳',gender:'女',age:42,syndrome:'肝火扰心',mainScore:88,sleepScore:55,status:'随访中',date:'2024-05-03',symptoms:['急躁易怒','头痛目赤','彻夜不寐','胸胁胀满','口苦口干'],tongue:'舌红苔黄',pulse:'脉弦数',scores:{肝火扰心:88,痰热扰心:52,心脾两虚:22,心肾不交:18,心胆气虚:10},note:''},
  {id:'C2024003',patient:'张伟',gender:'男',age:58,syndrome:'心肾不交',mainScore:79,sleepScore:60,status:'病情稳定',date:'2024-04-28',symptoms:['心烦不寐','腰膝酸软','潮热盗汗','五心烦热','遗精或带下'],tongue:'舌红少苔',pulse:'脉细数',scores:{心肾不交:79,肝火扰心:40,心脾两虚:35,痰热扰心:20,心胆气虚:15},note:'患者服用天王补心丹2周，症状有所改善。'},
  {id:'C2024004',patient:'刘婷',gender:'女',age:29,syndrome:'痰热扰心',mainScore:75,sleepScore:58,status:'随访中',date:'2024-05-05',symptoms:['心烦不寐','头重','口苦痰多','胸闷','脘腹痞满'],tongue:'舌红苔黄腻',pulse:'脉滑数',scores:{痰热扰心:75,肝火扰心:60,心脾两虚:28,心肾不交:22,心胆气虚:18},note:''},
  {id:'C2024005',patient:'陈建国',gender:'男',age:51,syndrome:'心胆气虚',mainScore:71,sleepScore:65,status:'病情稳定',date:'2024-04-20',symptoms:['不寐多梦','易于惊醒','触事善惊','气短自汗','倦怠乏力'],tongue:'舌淡苔薄',pulse:'脉弦细',scores:{心胆气虚:71,心脾两虚:55,心肾不交:30,肝火扰心:15,痰热扰心:10},note:'安神定志丸加减，已明显好转。'},
  {id:'C2024006',patient:'赵晓梅',gender:'女',age:38,syndrome:'心脾两虚',mainScore:84,sleepScore:72,status:'已结案',date:'2024-03-15',symptoms:['多梦','健忘','倦怠食少','面色萎黄','月经量少'],tongue:'舌淡苔薄',pulse:'脉细弱',scores:{心脾两虚:84,心胆气虚:40,心肾不交:28,肝火扰心:12,痰热扰心:8},note:'治疗3个月，睡眠质量明显改善，已结案。'},
  {id:'C2024007',patient:'孙磊',gender:'男',age:46,syndrome:'混合证型',mainScore:65,sleepScore:62,status:'随访中',date:'2024-05-07',symptoms:['入睡困难','急躁','腰酸','心悸','口干'],tongue:'舌红边有齿痕',pulse:'脉细弦',scores:{肝火扰心:65,心肾不交:62,心脾两虚:45,痰热扰心:30,心胆气虚:25},note:''},
  {id:'C2024008',patient:'周敏',gender:'女',age:33,syndrome:'肝火扰心',mainScore:91,sleepScore:50,status:'随访中',date:'2024-05-08',symptoms:['不寐','急躁易怒','头目胀痛','目赤','便秘溲赤'],tongue:'舌红苔黄',pulse:'脉弦而有力',scores:{肝火扰心:91,痰热扰心:45,心脾两虚:18,心肾不交:15,心胆气虚:12},note:''},
  {id:'C2024009',patient:'吴志远',gender:'男',age:62,syndrome:'心肾不交',mainScore:76,sleepScore:63,status:'病情稳定',date:'2024-04-10',symptoms:['心烦不安','失眠','健忘','腰膝酸软','头晕耳鸣'],tongue:'舌红无苔',pulse:'脉细',scores:{心肾不交:76,肝火扰心:35,心脾两虚:42,痰热扰心:15,心胆气虚:20},note:''},
  {id:'C2024010',patient:'郑雪',gender:'女',age:25,syndrome:'心胆气虚',mainScore:68,sleepScore:70,status:'已结案',date:'2024-02-20',symptoms:['入睡困难','多梦惊醒','心神不安','胆怯恐惧'],tongue:'舌淡',pulse:'脉弦细',scores:{心胆气虚:68,心脾两虚:50,心肾不交:25,肝火扰心:10,痰热扰心:8},note:''},
  {id:'C2024011',patient:'马东',gender:'男',age:44,syndrome:'痰热扰心',mainScore:80,sleepScore:57,status:'随访中',date:'2024-05-02',symptoms:['心烦不寐','头重目眩','痰多胸闷','恶心','苔黄腻'],tongue:'苔黄腻',pulse:'脉滑数',scores:{痰热扰心:80,肝火扰心:55,心脾两虚:25,心肾不交:20,心胆气虚:15},note:''},
  {id:'C2024012',patient:'林华',gender:'女',age:55,syndrome:'心脾两虚',mainScore:78,sleepScore:66,status:'病情稳定',date:'2024-04-25',symptoms:['多梦易醒','心悸','食欲差','神疲','面黄'],tongue:'舌淡苔白',pulse:'脉细',scores:{心脾两虚:78,心胆气虚:48,心肾不交:32,肝火扰心:18,痰热扰心:12},note:'归脾汤加减有效。'},
];

const syndromeClass={'肝火扰心':'badge-liver','痰热扰心':'badge-phlegm','心脾两虚':'badge-heart-spleen','心肾不交':'badge-heart-kidney','心胆气虚':'badge-gallbladder','混合证型':'badge-mixed'};
const statusDot={'随访中':'dot-follow','病情稳定':'dot-stable','已结案':'dot-closed'};
let filteredCases=[...MOCK_CASES];
let currentPage=1;
const PAGE_SIZE=8;

function applyFilter(){
  const name=document.getElementById('filterName').value.trim().toLowerCase();
  const syn=document.getElementById('filterSyndrome').value;
  const stat=document.getElementById('filterStatus').value;
  const date=document.getElementById('filterDate').value;
  filteredCases=MOCK_CASES.filter(c=>{
    if(name&&!c.patient.includes(name))return false;
    if(syn&&c.syndrome!==syn)return false;
    if(stat&&c.status!==stat)return false;
    if(date&&c.date!==date)return false;
    return true;
  });
  currentPage=1;
  renderTable();
}
function resetFilter(){
  document.getElementById('filterName').value='';
  document.getElementById('filterSyndrome').value='';
  document.getElementById('filterStatus').value='';
  document.getElementById('filterDate').value='';
  filteredCases=[...MOCK_CASES];
  currentPage=1;
  renderTable();
}
function renderTable(){
  const start=(currentPage-1)*PAGE_SIZE;
  const page=filteredCases.slice(start,start+PAGE_SIZE);
  const tbody=document.getElementById('caseTableBody');
  if(page.length===0){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--doctor-muted)">暂无符合条件的病例</td></tr>';renderPagination();return;}
  tbody.innerHTML=page.map((c,i)=>`
    <tr>
      <td style="font-family:monospace;color:var(--doctor-primary)">${c.id}</td>
      <td style="font-weight:600;color:var(--doctor-text)">${c.patient}</td>
      <td style="color:var(--doctor-muted)">${c.gender} / ${c.age}岁</td>
      <td><span class="syndrome-badge ${syndromeClass[c.syndrome]||'badge-mixed'}">${c.syndrome}</span></td>
      <td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:6px;background:#1A2035;border-radius:3px;overflow:hidden"><div style="height:100%;width:${c.mainScore}%;background:linear-gradient(90deg,#2A9D8F,#26C6DA);border-radius:3px"></div></div><span style="font-size:12px;min-width:28px">${c.mainScore}</span></div></td>
      <td><span style="color:${c.sleepScore>=70?'#22c55e':c.sleepScore>=55?'#f59e0b':'#ef4444'};font-weight:600">${c.sleepScore}</span></td>
      <td><span class="status-dot ${statusDot[c.status]}"></span>${c.status}</td>
      <td style="color:var(--doctor-muted)">${c.date}</td>
      <td><button class="view-btn" onclick="openDrawer(${start+i})">查看详情</button></td>
    </tr>
  `).join('');
  renderPagination();
}
function renderPagination(){
  const total=Math.ceil(filteredCases.length/PAGE_SIZE);
  const box=document.getElementById('pagination');
  if(total<=1){box.innerHTML='';return;}
  let html='';
  if(currentPage>1)html+=`<div class="page-btn" onclick="goPage(${currentPage-1})">‹</div>`;
  for(let i=1;i<=total;i++){if(i===1||i===total||Math.abs(i-currentPage)<=1)html+=`<div class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</div>`;else if(Math.abs(i-currentPage)===2)html+=`<div style="color:var(--doctor-muted)">…</div>`;}
  if(currentPage<total)html+=`<div class="page-btn" onclick="goPage(${currentPage+1})">›</div>`;
  box.innerHTML=html;
}
function goPage(p){currentPage=p;renderTable();}

function openDrawer(idx){
  const c=filteredCases[idx];
  document.getElementById('drawerCaseId').textContent='编号：'+c.id+'  ·  患者：'+c.patient;
  const synColors={肝火扰心:'#92400e',痰热扰心:'#4c1d95',心脾两虚:'#065f46',心肾不交:'#1e3a8a',心胆气虚:'#9f1239',混合证型:'#374151'};
  const scoreRows=Object.entries(c.scores).map(([k,v])=>`
    <div class="score-bar-row">
      <div class="score-bar-label">${k}</div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${v}%"></div></div>
      <div class="score-bar-val">${v}</div>
    </div>`).join('');
  document.getElementById('drawerBody').innerHTML=`
    <div class="drawer-section">
      <div class="drawer-section-title">📋 基本信息</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">患者姓名</div><div class="info-value">${c.patient}</div></div>
        <div class="info-item"><div class="info-label">性别/年龄</div><div class="info-value">${c.gender} · ${c.age}岁</div></div>
        <div class="info-item"><div class="info-label">评估日期</div><div class="info-value">${c.date}</div></div>
        <div class="info-item"><div class="info-label">随访状态</div><div class="info-value"><span class="status-dot ${statusDot[c.status]}"></span>${c.status}</div></div>
        <div class="info-item"><div class="info-label">主证</div><div class="info-value"><span class="syndrome-badge ${syndromeClass[c.syndrome]||'badge-mixed'}">${c.syndrome}</span></div></div>
        <div class="info-item"><div class="info-label">睡眠评分</div><div class="info-value" style="color:${c.sleepScore>=70?'#22c55e':c.sleepScore>=55?'#f59e0b':'#ef4444'};font-size:20px;font-weight:700">${c.sleepScore}<span style="font-size:13px;color:var(--doctor-muted)"> / 100</span></div></div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">🔍 主要症状</div>
      <div class="symptom-list">${c.symptoms.map(s=>`<span class="symptom-tag">${s}</span>`).join('')}</div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">👅 舌脉象</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">舌象</div><div class="info-value">${c.tongue}</div></div>
        <div class="info-item"><div class="info-label">脉象</div><div class="info-value">${c.pulse}</div></div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">📊 证型评分分布</div>
      <div class="score-bars">${scoreRows}</div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">📝 医生备注</div>
      <div class="doctor-note">
        <textarea class="note-textarea" id="noteInput_${c.id}" placeholder="输入对该病例的观察和建议...">${c.note}</textarea>
        <button class="save-note-btn" onclick="saveNote('${c.id}')">保存备注</button>
      </div>
    </div>
  `;
  document.getElementById('detailDrawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeDrawer(){
  document.getElementById('detailDrawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function saveNote(id){
  const val=document.getElementById('noteInput_'+id).value;
  const c=MOCK_CASES.find(x=>x.id===id);
  if(c)c.note=val;
  showToast('备注已保存','success');
}

// Init stats
document.getElementById('totalCases').textContent=MOCK_CASES.length;
document.getElementById('thisWeek').textContent=MOCK_CASES.filter(c=>c.date>='2024-05-01').length;
document.getElementById('followCount').textContent=MOCK_CASES.filter(c=>c.status==='随访中').length;
const avgScore=Math.round(MOCK_CASES.reduce((a,c)=>a+c.sleepScore,0)/MOCK_CASES.length);
document.getElementById('avgScoreAll').textContent=avgScore;
renderTable();

// Auth guard
window.addEventListener('DOMContentLoaded',()=>{
  const u=getCurrentUser();
  if(!u||u.role!=='doctor'){location.href='../login.html';}
});
</script>
</body>
</html>
