<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 安眠智道</title>
<link rel="stylesheet" href="css/common.css">
<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  background: var(--bg-dark);
  position: relative;
  overflow: hidden;
}

.auth-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 60% 80% at 20% 50%, rgba(107,79,160,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 30%, rgba(42,157,143,0.15) 0%, transparent 50%);
}

.auth-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
  position: relative;
  z-index: 1;
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 60px;
}

.auth-logo-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #C9A227, #F0C040);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 20px rgba(201,162,39,0.4);
}

.auth-logo-text {
  display: flex; flex-direction: column;
}

.auth-logo-name {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #C9A227, #F0C040);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.auth-logo-sub {
  font-size: 11px; color: rgba(255,255,255,0.4);
}

.auth-left-title {
  font-size: 40px; font-weight: 900;
  color: #fff; line-height: 1.3;
  margin-bottom: 20px;
}

.auth-left-title span {
  background: linear-gradient(135deg, #C9A227, #F0C040);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.auth-left-desc {
  font-size: 16px; color: rgba(255,255,255,0.55);
  line-height: 1.8; margin-bottom: 48px;
}

.auth-features {
  display: flex; flex-direction: column; gap: 16px;
}

.auth-feature-item {
  display: flex; align-items: center; gap: 16px;
}

.auth-feature-icon {
  width: 40px; height: 40px;
  background: rgba(107,79,160,0.2);
  border: 1px solid rgba(107,79,160,0.3);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.auth-feature-text strong {
  display: block; font-size: 14px; font-weight: 600;
  color: rgba(255,255,255,0.9); margin-bottom: 2px;
}

.auth-feature-text span {
  font-size: 12px; color: rgba(255,255,255,0.45);
}

.auth-right {
  width: 520px; flex-shrink: 0;
  background: rgba(255,255,255,0.03);
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  padding: 48px;
  position: relative; z-index: 1;
}

.auth-card {
  width: 100%; max-width: 420px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 40px;
  backdrop-filter: blur(20px);
}

.auth-card-title {
  font-size: 26px; font-weight: 800;
  color: #fff; margin-bottom: 8px;
}

.auth-card-subtitle {
  font-size: 14px; color: rgba(255,255,255,0.45);
  margin-bottom: 32px;
}

/* 角色切换 */
.role-toggle {
  display: flex; gap: 0;
  background: rgba(255,255,255,0.06);
  border-radius: 10px; padding: 4px;
  margin-bottom: 28px;
}

.role-btn {
  flex: 1; padding: 10px;
  background: transparent;
  border: none; cursor: pointer;
  border-radius: 8px;
  font-size: 14px; font-weight: 600;
  color: rgba(255,255,255,0.5);
  transition: all 0.3s;
  font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}

.role-btn.active {
  background: var(--purple-gradient);
  color: #fff;
  box-shadow: 0 4px 12px rgba(107,79,160,0.3);
}

/* 输入框 - 暗色版 */
.dark-input {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  font-size: 15px; color: #fff;
  transition: all 0.3s;
  font-family: inherit;
  outline: none;
}

.dark-input:focus {
  border-color: var(--primary-light);
  background: rgba(255,255,255,0.09);
  box-shadow: 0 0 0 3px rgba(107,79,160,0.2);
}

.dark-input::placeholder { color: rgba(255,255,255,0.3); }

.input-group {
  position: relative; margin-bottom: 16px;
}

.input-label {
  display: block; font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.6); margin-bottom: 8px;
}

.input-toggle-eye {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: rgba(255,255,255,0.35);
  font-size: 16px; user-select: none;
}

.auth-submit {
  width: 100%; padding: 14px;
  background: var(--purple-gradient);
  border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700;
  color: #fff; cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
  font-family: inherit;
  position: relative; overflow: hidden;
}

.auth-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(107,79,160,0.4);
}

.auth-submit:active { transform: translateY(0); }

.auth-submit.loading {
  pointer-events: none;
  opacity: 0.7;
}

.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0;
}

.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1;
  height: 1px; background: rgba(255,255,255,0.08);
}

.auth-divider span {
  font-size: 12px; color: rgba(255,255,255,0.3); white-space: nowrap;
}

.demo-accounts {
  display: flex; flex-direction: column; gap: 8px;
}

.demo-btn {
  width: 100%; padding: 10px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; cursor: pointer;
  font-size: 13px; color: rgba(255,255,255,0.65);
  text-align: left; transition: all 0.3s;
  font-family: inherit;
  display: flex; align-items: center; justify-content: space-between;
}

.demo-btn:hover {
  background: rgba(107,79,160,0.15);
  border-color: rgba(107,79,160,0.3);
  color: #fff;
}

.demo-btn span {
  background: rgba(201,162,39,0.15);
  color: var(--secondary);
  padding: 2px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
}

.auth-footer-text {
  text-align: center; margin-top: 24px;
  font-size: 13px; color: rgba(255,255,255,0.4);
}

.auth-footer-text a {
  color: var(--secondary-light); font-weight: 600;
}

.auth-footer-text a:hover { text-decoration: underline; }

@media (max-width: 1024px) {
  .auth-left { display: none; }
  .auth-right { width: 100%; border-left: none; padding: 32px 24px; }
}
</style>
</head>
<body>
<div class="auth-page">
  <!-- 左侧宣传区 -->
  <div class="auth-left">
    <div class="auth-logo">
      <div class="auth-logo-icon">☯</div>
      <div class="auth-logo-text">
        <span class="auth-logo-name">安眠智道</span>
        <span class="auth-logo-sub">中医原发性失眠辅助调养系统</span>
      </div>
    </div>
    <h1 class="auth-left-title">
      登录，开启您的<br>
      <span>智能调养之旅</span>
    </h1>
    <p class="auth-left-desc">
      AI驱动的中医辨证系统，依托权威教材与专家共识，<br>
      为您提供精准、专业、个性化的失眠调养指导。
    </p>
    <div class="auth-features">
      <div class="auth-feature-item">
        <div class="auth-feature-icon">🔬</div>
        <div class="auth-feature-text">
          <strong>AI智能辨证</strong>
          <span>规则推理引擎，精准匹配五大失眠证型</span>
        </div>
      </div>
      <div class="auth-feature-item">
        <div class="auth-feature-icon">🌿</div>
        <div class="auth-feature-text">
          <strong>个性化调养方案</strong>
          <span>五大板块专属调养，科学实用，居家可操作</span>
        </div>
      </div>
      <div class="auth-feature-item">
        <div class="auth-feature-icon">📊</div>
        <div class="auth-feature-text">
          <strong>症状趋势追踪</strong>
          <span>可视化病例记录，直观评估调养效果</span>
        </div>
      </div>
      <div class="auth-feature-item">
        <div class="auth-feature-icon">⚕️</div>
        <div class="auth-feature-text">
          <strong>医患双端支持</strong>
          <span>用户居家自查，医生专业辅助管理</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧登录表单 -->
  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-card-title">欢迎回来</h2>
      <p class="auth-card-subtitle">登录您的账号，继续您的调养之旅</p>

      <!-- 角色切换 -->
      <div class="role-toggle">
        <button class="role-btn active" id="roleUser" onclick="switchRole('user')">
          👤 普通用户
        </button>
        <button class="role-btn" id="roleDoctor" onclick="switchRole('doctor')">
          ⚕️ 医生
        </button>
      </div>

      <!-- 登录表单 -->
      <form id="loginForm">
        <div class="input-group">
          <label class="input-label">手机号 / 账号</label>
          <input type="text" class="dark-input" id="loginPhone" placeholder="请输入手机号或账号" autocomplete="username">
        </div>
        <div class="input-group">
          <label class="input-label">密码</label>
          <input type="password" class="dark-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
          <span class="input-toggle-eye" onclick="togglePassword('loginPassword')">👁</span>
        </div>

        <button type="submit" class="auth-submit" id="loginBtn">
          登录
        </button>
      </form>

      <div class="auth-divider"><span>或使用演示账号快速体验</span></div>

      <div class="demo-accounts">
        <button class="demo-btn" onclick="quickLogin('demo_user', 'user123', 'user')">
          <span>👤 演示用户：赵晓梅</span>
          <span>普通用户</span>
        </button>
        <button class="demo-btn" onclick="quickLogin('demo_doctor', 'doctor123', 'doctor')">
          <span>⚕️ 演示医生：陈明华</span>
          <span>医生账号</span>
        </button>
      </div>

      <p class="auth-footer-text">
        还没有账号？<a href="register.html">免费注册</a>
        &nbsp;·&nbsp;
        <a href="index.html">返回首页</a>
      </p>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
let currentRole = 'user';

function switchRole(role) {
  currentRole = role;
  document.getElementById('roleUser').classList.toggle('active', role === 'user');
  document.getElementById('roleDoctor').classList.toggle('active', role === 'doctor');
}

function togglePassword(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function quickLogin(phone, password, role) {
  document.getElementById('loginPhone').value = phone;
  document.getElementById('loginPassword').value = password;
  switchRole(role);
  document.getElementById('loginForm').dispatchEvent(new Event('submit'));
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const phone = document.getElementById('loginPhone').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');

  if (!phone || !password) {
    showToast('请填写手机号和密码', 'warning');
    return;
  }

  btn.textContent = '登录中...';
  btn.classList.add('loading');

  // 模拟登录延迟
  setTimeout(() => {
    const user = findUser(phone, password);
    if (!user) {
      showToast('账号或密码错误，请重试', 'error');
      btn.textContent = '登录';
      btn.classList.remove('loading');
      return;
    }

    if (user.role !== currentRole) {
      showToast(`此账号为${user.role === 'doctor' ? '医生' : '普通用户'}账号，请切换角色后登录`, 'warning');
      btn.textContent = '登录';
      btn.classList.remove('loading');
      return;
    }

    saveUser(user);
    showToast(`欢迎回来，${user.name}！正在跳转...`, 'success');

    setTimeout(() => {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      if (redirect) { window.location.href = redirect; return; }
      window.location.href = user.role === 'doctor' ? 'doctor/dashboard.html' : 'user/dashboard.html';
    }, 1200);
  }, 800);
});
</script>
</body>
</html>
